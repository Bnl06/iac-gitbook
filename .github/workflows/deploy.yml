name: Deploy GitBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository # haalt je repo-code binnen
        uses: actions/checkout@v4

      - name: Setup Node.js # installeert Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies # installeert HonKit uit package.json
        run: npm install

      - name: Build GitBook # bouwt je boek naar de map _book
        run: npm run build

      - name: Setup GitHub Pages # zet GitHub Pages klaar
        uses: actions/configure-pages@v5

      - name: Upload GitBook artifact # uploadt de gebouwde website
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_book

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages # publiceert de website
        id: deployment
        uses: actions/deploy-pages@v4
